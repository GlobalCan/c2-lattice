<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c1018"/><stop offset="100%" stop-color="#06080d"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Architecture</text>

  <!-- Browser Dashboard -->
  <rect x="270" y="55" width="260" height="48" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <circle cx="290" cy="79" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="305" y="84" fill="#e2e8f0" font-size="13" font-weight="600">Browser Dashboard</text>
  <text x="537" y="84" fill="#64748b" font-size="10" text-anchor="end">:7899/dashboard</text>

  <!-- Arrow down -->
  <line x1="400" y1="103" x2="400" y2="135" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,130 406,130 400,140" fill="#334155"/>

  <!-- Broker Box -->
  <rect x="150" y="140" width="500" height="180" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="400" y="168" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">Broker Daemon</text>
  <text x="400" y="186" text-anchor="middle" fill="#64748b" font-size="10">Python stdlib HTTPServer + SQLite WAL | 127.0.0.1:7899</text>

  <!-- Feature boxes inside broker -->
  <rect x="170" y="200" width="115" height="36" rx="6" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="227" y="222" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">Task DAGs</text>

  <rect x="295" y="200" width="115" height="36" rx="6" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="352" y="222" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">Messaging</text>

  <rect x="420" y="200" width="115" height="36" rx="6" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="477" y="222" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">Shared Memory</text>

  <rect x="545" y="200" width="90" height="36" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="590" y="222" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">File Locks</text>

  <rect x="170" y="248" width="115" height="36" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="227" y="264" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">HMAC Auth</text>
  <text x="227" y="276" text-anchor="middle" fill="#64748b" font-size="8">SHA-256 tokens</text>

  <rect x="295" y="248" width="115" height="36" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="352" y="264" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Content Filter</text>
  <text x="352" y="276" text-anchor="middle" fill="#64748b" font-size="8">Injection defense</text>

  <rect x="420" y="248" width="115" height="36" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="477" y="264" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Rate Limiting</text>
  <text x="477" y="276" text-anchor="middle" fill="#64748b" font-size="8">10 msg/min/peer</text>

  <rect x="545" y="248" width="90" height="36" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="590" y="264" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Role RBAC</text>
  <text x="590" y="276" text-anchor="middle" fill="#64748b" font-size="8">Arch / Worker</text>

  <!-- Security label -->
  <text x="172" y="296" fill="#64748b" font-size="9" font-style="italic">Security layer</text>

  <!-- Arrows down to MCP servers -->
  <line x1="250" y1="320" x2="250" y2="360" stroke="#334155" stroke-width="1.5"/>
  <polygon points="244,355 256,355 250,365" fill="#334155"/>
  <line x1="400" y1="320" x2="400" y2="360" stroke="#334155" stroke-width="1.5"/>
  <polygon points="394,355 406,355 400,365" fill="#334155"/>
  <line x1="550" y1="320" x2="550" y2="360" stroke="#334155" stroke-width="1.5"/>
  <polygon points="544,355 556,355 550,365" fill="#334155"/>

  <!-- MCP Server label -->
  <text x="400" y="350" text-anchor="middle" fill="#64748b" font-size="9">stdio JSON-RPC 2.0</text>

  <!-- Architect -->
  <rect x="170" y="370" width="160" height="55" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <circle cx="195" cy="390" r="12" fill="url(#purple)"/>
  <text x="197" y="394" text-anchor="middle" fill="white" font-size="8" font-weight="700">AR</text>
  <text x="215" y="390" fill="#f8fafc" font-size="11" font-weight="600">Architect</text>
  <text x="215" y="405" fill="#64748b" font-size="9">Creates tasks, spawns workers</text>
  <text x="215" y="417" fill="#64748b" font-size="9">Monitors, delegates, reports</text>

  <!-- Worker A -->
  <rect x="345" y="370" width="130" height="55" rx="8" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="370" cy="390" r="12" fill="url(#amber)"/>
  <text x="372" y="394" text-anchor="middle" fill="white" font-size="8" font-weight="700">W1</text>
  <text x="390" y="390" fill="#f8fafc" font-size="11" font-weight="600">Worker A</text>
  <text x="390" y="405" fill="#64748b" font-size="9">Claims tasks, builds</text>
  <text x="390" y="417" fill="#64748b" font-size="9">Budget-capped, pausable</text>

  <!-- Worker B -->
  <rect x="490" y="370" width="130" height="55" rx="8" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="515" cy="390" r="12" fill="url(#amber)"/>
  <text x="517" y="394" text-anchor="middle" fill="white" font-size="8" font-weight="700">W2</text>
  <text x="535" y="390" fill="#f8fafc" font-size="11" font-weight="600">Worker B</text>
  <text x="535" y="405" fill="#64748b" font-size="9">Claims tasks, builds</text>
  <text x="535" y="417" fill="#64748b" font-size="9">Budget-capped, pausable</text>

  <!-- Footer stats -->
  <text x="170" y="465" fill="#22c55e" font-size="11" font-weight="600">22 MCP Tools</text>
  <text x="300" y="465" fill="#3b82f6" font-size="11" font-weight="600">235+ Tests</text>
  <text x="410" y="465" fill="#f59e0b" font-size="11" font-weight="600">Zero Dependencies</text>
  <text x="570" y="465" fill="#ef4444" font-size="11" font-weight="600">HMAC + RBAC</text>

  <text x="400" y="488" text-anchor="middle" fill="#475569" font-size="9">Python stdlib only | Localhost (127.0.0.1) | SQLite WAL mode</text>
</svg>
