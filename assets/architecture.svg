<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c1018"/><stop offset="100%" stop-color="#06080d"/></linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
  </defs>
  <rect width="880" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Architecture</text>

  <!-- Browser Dashboard -->
  <rect x="310" y="58" width="260" height="48" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <circle cx="330" cy="82" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="345" y="87" fill="#e2e8f0" font-size="13" font-weight="600">Browser Dashboard</text>
  <text x="555" y="87" fill="#64748b" font-size="10" text-anchor="end">:7899/dashboard</text>

  <!-- Arrow down -->
  <line x1="440" y1="106" x2="440" y2="138" stroke="#334155" stroke-width="1.5"/>
  <polygon points="434,133 446,133 440,143" fill="#334155"/>

  <!-- Broker Box -->
  <rect x="100" y="145" width="680" height="185" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="440" y="173" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="700">Broker Daemon</text>
  <text x="440" y="191" text-anchor="middle" fill="#64748b" font-size="10">Python stdlib HTTPServer + SQLite WAL | 127.0.0.1:7899</text>

  <!-- Feature boxes row 1 — evenly spaced across 680px box -->
  <rect x="125" y="205" width="140" height="36" rx="6" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="195" y="227" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">Task DAGs</text>

  <rect x="280" y="205" width="140" height="36" rx="6" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="350" y="227" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">Messaging</text>

  <rect x="435" y="205" width="140" height="36" rx="6" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="505" y="227" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Shared Memory</text>

  <rect x="590" y="205" width="140" height="36" rx="6" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="660" y="227" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">File Locks</text>

  <!-- Security row — evenly spaced -->
  <rect x="125" y="255" width="140" height="42" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="195" y="273" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">HMAC Auth</text>
  <text x="195" y="287" text-anchor="middle" fill="#64748b" font-size="9">SHA-256 tokens</text>

  <rect x="280" y="255" width="140" height="42" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="350" y="273" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">Content Filter</text>
  <text x="350" y="287" text-anchor="middle" fill="#64748b" font-size="9">Injection defense</text>

  <rect x="435" y="255" width="140" height="42" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="505" y="273" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">Rate Limiting</text>
  <text x="505" y="287" text-anchor="middle" fill="#64748b" font-size="9">10 msg/min/peer</text>

  <rect x="590" y="255" width="140" height="42" rx="6" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="660" y="273" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">Role RBAC</text>
  <text x="660" y="287" text-anchor="middle" fill="#64748b" font-size="9">Arch / Worker</text>

  <!-- Security label -->
  <text x="127" y="312" fill="#64748b" font-size="9" font-style="italic">Security layer</text>

  <!-- Arrows down to MCP servers -->
  <line x1="260" y1="330" x2="260" y2="370" stroke="#334155" stroke-width="1.5"/>
  <polygon points="254,365 266,365 260,375" fill="#334155"/>
  <line x1="440" y1="330" x2="440" y2="370" stroke="#334155" stroke-width="1.5"/>
  <polygon points="434,365 446,365 440,375" fill="#334155"/>
  <line x1="620" y1="330" x2="620" y2="370" stroke="#334155" stroke-width="1.5"/>
  <polygon points="614,365 626,365 620,375" fill="#334155"/>

  <!-- MCP Server label -->
  <text x="440" y="362" text-anchor="middle" fill="#64748b" font-size="9">stdio JSON-RPC 2.0</text>

  <!-- Architect -->
  <rect x="160" y="382" width="200" height="58" rx="8" fill="rgba(139,92,246,0.06)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <circle cx="185" cy="404" r="13" fill="url(#purple)"/>
  <text x="185" y="408" text-anchor="middle" fill="white" font-size="8" font-weight="700">AR</text>
  <text x="210" y="402" fill="#f8fafc" font-size="12" font-weight="600">Architect</text>
  <text x="210" y="418" fill="#64748b" font-size="9">Creates tasks, spawns workers</text>
  <text x="210" y="430" fill="#64748b" font-size="9">Monitors, delegates, reports</text>

  <!-- Worker A -->
  <rect x="380" y="382" width="170" height="58" rx="8" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="405" cy="404" r="13" fill="url(#amber)"/>
  <text x="405" y="408" text-anchor="middle" fill="white" font-size="8" font-weight="700">W1</text>
  <text x="430" y="402" fill="#f8fafc" font-size="12" font-weight="600">Worker A</text>
  <text x="430" y="418" fill="#64748b" font-size="9">Claims tasks, builds</text>
  <text x="430" y="430" fill="#64748b" font-size="9">Budget-capped, pausable</text>

  <!-- Worker B -->
  <rect x="570" y="382" width="170" height="58" rx="8" fill="rgba(245,158,11,0.06)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <circle cx="595" cy="404" r="13" fill="url(#amber)"/>
  <text x="595" y="408" text-anchor="middle" fill="white" font-size="8" font-weight="700">W2</text>
  <text x="620" y="402" fill="#f8fafc" font-size="12" font-weight="600">Worker B</text>
  <text x="620" y="418" fill="#64748b" font-size="9">Claims tasks, builds</text>
  <text x="620" y="430" fill="#64748b" font-size="9">Budget-capped, pausable</text>

  <!-- Footer stats — evenly spaced -->
  <text x="175" y="480" fill="#22c55e" font-size="12" font-weight="600">22 MCP Tools</text>
  <text x="340" y="480" fill="#3b82f6" font-size="12" font-weight="600">235+ Tests</text>
  <text x="490" y="480" fill="#f59e0b" font-size="12" font-weight="600">Zero Dependencies</text>
  <text x="670" y="480" fill="#ef4444" font-size="12" font-weight="600">HMAC + RBAC</text>

  <text x="440" y="505" text-anchor="middle" fill="#475569" font-size="10">Python stdlib only | Localhost (127.0.0.1) | SQLite WAL mode</text>
</svg>
